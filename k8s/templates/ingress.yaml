apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.app.name }}
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: "/{{ .Values.app.routePrefix }}"
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.app.name }}
                port:
                  number: {{ .Values.app.port }}
